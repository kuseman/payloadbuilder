on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
    - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Publish version tags to maven central

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Set version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=${TAG/v/}" >> $GITHUB_ENV
      - run: echo "Will start a Maven Central upload with tag ${VERSION}"
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: 'maven'
      - name: Compute changelog from-tag (last X releases)
        id: changelog_range
        run: |
          FROM_TAG=$(git tag -l 'v*' --sort=-version:refname | sed -n '10p')
          if [ -z "$FROM_TAG" ]; then
            FROM_TAG=$(git tag -l 'v*' --sort=version:refname | head -1)
          fi
          echo "FROM_TAG=${FROM_TAG}" >> $GITHUB_OUTPUT

      - name: Publish package
        run: mvn --batch-mode clean deploy -DperformRelease=true -DskipTests=true -Dcheckstyle.skip -Dchangelog.fromRef=${{ steps.changelog_range.outputs.FROM_TAG }}
        env:
          MAVEN_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSS_SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
